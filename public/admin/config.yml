backend:
  name: github
  repo: marvinmanex-cyber/lobi-stars-website
  branch: main
  # No base_url needed: sign in via "Sign in with personal access token" on the
  # /admin login screen (Sveltia CMS's built-in GitHub PAT flow). Only add a
  # base_url + OAuth worker later if non-technical staff need a friendlier login.

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "news"
    label: "News Articles"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Match Report", "Transfers", "Club News", "Academy", "Community"]}
      - {label: "Date", name: "date", widget: "date"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "players"
    label: "Squad / Players"
    folder: "src/content/players"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Position", name: "position", widget: "select", options: ["GK", "DEF", "MID", "FWD"]}
      - {label: "Jersey Number", name: "number", widget: "number"}
      - {label: "Nationality", name: "nationality", widget: "string", default: "Nigeria"}
      - {label: "Appearances", name: "apps", widget: "number"}
      - {label: "Goals", name: "goals", widget: "number"}
      - {label: "Photo", name: "photo", widget: "image", required: false}

  - name: "gallery"
    label: "Gallery Photos"
    folder: "src/content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Caption", name: "caption", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image"}

  - name: "fixtures"
    label: "Fixtures & Results"
    folder: "src/content/fixtures"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Home Team", name: "home", widget: "string"}
      - {label: "Away Team", name: "away", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Venue", name: "venue", widget: "string"}
      - {label: "Competition", name: "competition", widget: "string", default: "NPFL"}
      - {label: "Home Score", name: "home_score", widget: "number", required: false}
      - {label: "Away Score", name: "away_score", widget: "number", required: false}
      - {label: "Status", name: "status", widget: "select", options: ["Upcoming", "Completed"]}

  - name: "staff"
    label: "Club Management & Staff"
    folder: "src/content/staff"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Initials (shown if no photo)", name: "initials", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Display Order", name: "order", widget: "number", default: 10}
      - {label: "Short Bio", name: "bio", widget: "text"}

  - name: "merchandise"
    label: "Club Shop / Merchandise"
    folder: "src/content/merchandise"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "name", widget: "string"}
      - {label: "Price (e.g. ₦15,000)", name: "price", widget: "string", default: "₦0"}
      - {label: "Photo", name: "photo", widget: "image"}
      - {label: "Badge (e.g. NEW, PREMIUM)", name: "badge", widget: "string", required: false}
      - {label: "Badge Color", name: "badgeColor", widget: "string", default: "#D4202B"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Shop Link", name: "shopUrl", widget: "string", default: "https://www.jumia.com.ng"}

  - name: "heroSlides"
    label: "Homepage Hero Slides"
    folder: "src/content/hero-slides"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Photo", name: "photo", widget: "image"}
      - {label: "Display Order", name: "order", widget: "number", default: 10}

  - name: "sponsors"
    label: "Sponsor Logos (Top Bar)"
    folder: "src/content/sponsors"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Sponsor Name", name: "name", widget: "string"}
      - {label: "Logo", name: "logo", widget: "image"}
      - {label: "Website Link", name: "url", widget: "string", default: "#"}
      - {label: "Display Order", name: "order", widget: "number", default: 10}